name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: agent-starter-pack-456401
  REGION: "us-central1"
  REPOSITORY: "ai-agents"                  # Name of your Artifact Registry repository

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # This defines the list of services to deploy
        service: [content-builder, judge, orchestrator, researcher, course-creator]
        include:
          # Map each service name to its local directory path
          - service: content-builder
            path: agents/content_builder
          - service: judge
            path: agents/judge
          - service: orchestrator
            path: agents/orchestrator
          - service: researcher
            path: agents/researcher
          - service: course-creator
            path: app

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Authorize Docker'
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          TAG_SHA=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
          TAG_LATEST=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:latest
          docker build -t $TAG_SHA -t $TAG_LATEST -f ${{ matrix.path }}/Dockerfile .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }} --all-tags

      - name: Deploy to Cloud Run
        id: deploy
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ matrix.service }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
          region: ${{ env.REGION }}
          # Allow unauthenticated access if this is a public API
          flags: '--allow-unauthenticated'

      - name: Show Output
        run: |
          echo "App is deployed and available at: ${{ steps.deploy.outputs.url }}"